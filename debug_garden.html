<!DOCTYPE html><html><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box}
#stage{position:relative;width:900px;aspect-ratio:3/2;overflow:hidden;background:#06202c}
#scene{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.peeker{position:absolute;transform:translate(-50%,-100%)}
.peeker img{width:100%;height:auto;display:block;image-rendering:pixelated}
.dot{position:absolute;width:6px;height:6px;background:#ff3b3b;border:1px solid #fff;border-radius:50%;transform:translate(-50%,-50%);z-index:9}
.tag{position:absolute;transform:translate(-50%,0);font:bold 10px sans-serif;color:#fff;background:rgba(220,40,40,.85);padding:0 3px;border-radius:5px;z-index:9}
</style></head><body>
<div id="stage"><img id="scene" src="bg_garden.png"></div>
<script>
const SPOTS=[
 {x:23,y:41,t:'perch'},{x:40,y:39,t:'perch'},{x:55,y:37,t:'perch'},{x:61,y:47,t:'perch'},{x:46,y:22,t:'perch'},
 {x:26,y:66,t:'ground'},{x:45,y:75,t:'ground'},{x:62,y:79,t:'ground'},{x:78,y:71,t:'ground'},{x:35,y:85,t:'ground'},
 {x:14,y:63,t:'nap'},{x:88,y:64,t:'nap'}];
const POSE={perch:'sit',ground:'stand',nap:'sleep'};
const COLS=['teal','org','dark','grey'];
const SZ=9; const st=document.getElementById('stage');
SPOTS.forEach((s,i)=>{
  const d=document.createElement('div');d.className='peeker';
  d.style.left=s.x+'%';d.style.top=s.y+'%';d.style.width=SZ+'%';
  d.innerHTML='<img src="cat_'+COLS[i%4]+'_'+POSE[s.t]+'.png">';st.appendChild(d);
  const dot=document.createElement('div');dot.className='dot';dot.style.left=s.x+'%';dot.style.top=s.y+'%';st.appendChild(dot);
  const tg=document.createElement('div');tg.className='tag';tg.style.left=s.x+'%';tg.style.top=(s.y+1)+'%';tg.textContent=i+s.t[0];st.appendChild(tg);
});
</script></body></html>
