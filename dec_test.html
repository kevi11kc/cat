<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{background:#063;color:#fff;font:40px sans-serif;padding:40px}</style></head>
<body><div id="r">testing…</div><script>
async function deriveKey(pw,salt){const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),{name:'PBKDF2'},false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);}
async function decFile(url,pw){const buf=new Uint8Array(await (await fetch(url)).arrayBuffer());const salt=buf.slice(0,16),iv=buf.slice(16,28),ct=buf.slice(28);const key=await deriveKey(pw,salt);return crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);}
(async()=>{const r=document.getElementById('r');
 try{const j=new Uint8Array(await decFile('dave_pix8.jpeg.enc','54321'));
   const ok=j[0]===0xFF&&j[1]===0xD8; // JPEG magic
   r.textContent=(ok?'✅ 正確密碼解密成功 JPEG':'⚠️ 解密但非JPEG');
 }catch(e){r.textContent='❌ 解密失敗:'+e;}
 // 錯誤密碼應失敗
 try{await decFile('dave_pix8.jpeg.enc','00000');r.textContent+=' | ⚠️錯誤密碼竟成功';}
 catch(e){r.textContent+=' | ✅ 錯誤密碼被擋';}
})();
</script></body></html>
