<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{background:#0e3b52;margin:0;padding:18px;font-family:sans-serif;color:#eafcff}
.row{display:flex;gap:22px;margin:12px 0;align-items:flex-end}.cell{text-align:center}
img{width:130px;height:auto;image-rendering:pixelated;background:rgba(255,255,255,.05);border:1px solid #1fb6c9}h3{font-size:12px;margin:4px}
</style></head><body><h2>戴夫點陣風 · crispEdges 22px</h2><div id="grid"></div><script>
const SVGOPEN='<svg viewBox="0 0 64 56" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">';
  const W='#eef0ec', EAR='#ff9bb0', EYE='#ffd23b', PUP='#141010', NOSE='#7a4a4a';  // 仿綠貓配色
  function eyesFront(x1,x2,y){       // 大圓黃眼
    return `<circle cx="${x1}" cy="${y}" r="4.3" fill="${EYE}" stroke="#1d1a16" stroke-width="1.2"/>`+
      `<circle cx="${x2}" cy="${y}" r="4.3" fill="${EYE}" stroke="#1d1a16" stroke-width="1.2"/>`+
      `<circle cx="${x1}" cy="${y+.3}" r="1.9" fill="${PUP}"/><circle cx="${x2}" cy="${y+.3}" r="1.9" fill="${PUP}"/>`+
      `<circle cx="${x1+1.2}" cy="${y-1.3}" r=".8" fill="#fff"/><circle cx="${x2+1.2}" cy="${y-1.3}" r=".8" fill="#fff"/>`;
  }
  function buildPose(pose,c){
    const b=c.body, ol=c.ol, S='stroke="'+ol+'" stroke-width="2.1" stroke-linejoin="round"';
    let g='';
    if(pose==='sit'){                 // 正面坐（仿綠貓）
      g=`<path d="M19 46 q-15 1 -13 -13 q1 -6 6 -4 q-3 4 -1 9 q3 5 9 4 z" fill="${b}" ${S}/>
      <path d="M9 30 q-3 -4 0 -7" stroke="${W}" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M19 53 q-3 -23 13 -23 q16 0 13 23 z" fill="${b}" ${S}/>
      <path d="M26 53 q-1 -15 6 -17 q7 2 6 17 z" fill="${W}"/>
      <circle cx="32" cy="22" r="12.5" fill="${b}" ${S}/>
      <path d="M22 13 l-3 -11 l11 6 z" fill="${b}" ${S}/><path d="M42 13 l3 -11 l-11 6 z" fill="${b}" ${S}/>
      <path d="M23 11 l-1.5 -6 l6 3 z" fill="${EAR}"/><path d="M41 11 l1.5 -6 l-6 3 z" fill="${EAR}"/>
      <ellipse cx="32" cy="27" rx="7.5" ry="5.5" fill="${W}"/>
      ${eyesFront(26,38,22)}
      <path d="M30.5 26 h3 l-1.5 1.7 z" fill="${NOSE}"/>
      <path d="M32 27.7 q-2 1.8 -4 .5 M32 27.7 q2 1.8 4 .5" stroke="${NOSE}" stroke-width="1" fill="none" stroke-linecap="round"/>
      <path d="M24 27 l-9 -2 M24 29 l-9 1 M40 27 l9 -2 M40 29 l9 1" stroke="${ol}" stroke-width=".7" opacity=".45" stroke-linecap="round"/>
      <ellipse cx="26" cy="52" rx="4" ry="3" fill="${W}" stroke="${ol}" stroke-width="1.4"/>
      <ellipse cx="38" cy="52" rx="4" ry="3" fill="${W}" stroke="${ol}" stroke-width="1.4"/>`;
    } else if(pose==='loaf'){          // 正面趴（麵包貓）
      g=`<path d="M48 50 q14 1 11 -11 q-2 -5 -6 -2 q3 4 -1 8 q-3 4 -10 2 z" fill="${b}" ${S}/>
      <path d="M55 41 q3 -3 1 -6" stroke="${W}" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M15 53 q1 -17 17 -17 q16 0 17 17 z" fill="${b}" ${S}/>
      <ellipse cx="32" cy="49" rx="10" ry="6" fill="${W}"/>
      <circle cx="32" cy="31" r="12" fill="${b}" ${S}/>
      <path d="M22 22 l-3 -10 l10 5 z" fill="${b}" ${S}/><path d="M42 22 l3 -10 l-10 5 z" fill="${b}" ${S}/>
      <path d="M23 20 l-1.5 -5 l5 3 z" fill="${EAR}"/><path d="M41 20 l1.5 -5 l-5 3 z" fill="${EAR}"/>
      <ellipse cx="32" cy="36" rx="7" ry="5" fill="${W}"/>
      ${eyesFront(27,37,31)}
      <path d="M30.5 35 h3 l-1.5 1.6 z" fill="${NOSE}"/>
      <ellipse cx="25" cy="52" rx="3.4" ry="2.4" fill="${W}" stroke="${ol}" stroke-width="1.2"/>
      <ellipse cx="39" cy="52" rx="3.4" ry="2.4" fill="${W}" stroke="${ol}" stroke-width="1.2"/>`;
    } else if(pose==='sleep'){         // 側面蜷睡（閉眼）
      g=`<path d="M48 47 q14 -1 10 -12 q-3 -5 -7 -1 q4 4 -1 8 q-3 4 -9 3 z" fill="${b}" ${S}/>
      <path d="M56 36 q3 -3 1 -6" stroke="${W}" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="34" cy="43" rx="19" ry="11" fill="${b}" ${S}/>
      <ellipse cx="35" cy="47" rx="13" ry="5" fill="${W}"/>
      <circle cx="17" cy="43" r="9.5" fill="${b}" ${S}/>
      <path d="M10 35 l-2 -8 l8 4 z" fill="${b}" ${S}/><path d="M9 34 l-1 -4 l4 1 z" fill="${EAR}"/>
      <ellipse cx="13" cy="46" rx="5" ry="3.2" fill="${W}"/>
      <path d="M10 43 q3 2.4 6 0" stroke="#1d1a16" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M18 43 q3 2.4 6 0" stroke="#1d1a16" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="10" cy="46" rx="1.5" ry="1" fill="${NOSE}"/>`;
    } else {                            // stand 側面四腳
      g=`<path d="M50 28 q13 -4 10 -16 q-2 -5 -6 -3 q3 4 0 8 q-3 6 -10 6 z" fill="${b}" ${S}/>
      <path d="M58 13 q3 -3 1 -6" stroke="${W}" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse cx="34" cy="29" rx="19" ry="9" fill="${b}" ${S}/>
      <ellipse cx="34" cy="33" rx="14" ry="4.5" fill="${W}"/>
      <rect x="21" y="36" width="4.5" height="16" rx="2" fill="${b}" ${S}/><rect x="30" y="36" width="4.5" height="16" rx="2" fill="${b}" ${S}/>
      <rect x="41" y="36" width="4.5" height="16" rx="2" fill="${b}" ${S}/><rect x="49" y="36" width="4.5" height="16" rx="2" fill="${b}" ${S}/>
      <rect x="21" y="52" width="4.5" height="3" fill="${W}"/><rect x="30" y="52" width="4.5" height="3" fill="${W}"/><rect x="41" y="52" width="4.5" height="3" fill="${W}"/><rect x="49" y="52" width="4.5" height="3" fill="${W}"/>
      <circle cx="14" cy="24" r="9.5" fill="${b}" ${S}/>
      <path d="M7 16 l-2 -8 l8 4 z" fill="${b}" ${S}/><path d="M21 16 l2 -8 l-8 4 z" fill="${b}" ${S}/>
      <path d="M8 15 l-1 -4 l4 2 z" fill="${EAR}"/><path d="M20 15 l1 -4 l-4 2 z" fill="${EAR}"/>
      <ellipse cx="11" cy="27" rx="5" ry="3.4" fill="${W}"/>
      ${eyesFront(10,18,24)}
      <path d="M8.5 26 h3 l-1.5 1.5 z" fill="${NOSE}"/>`;
    }
    return SVGOPEN+'<g>'+g+'</g></svg>';
  }
const FAMILY=[
    {name:'mom', size:3.0, body:'#5fb6c2', ol:'#1f4e57'},   // 仿綠貓的青綠（母貓較大）
    {name:'org', size:2.5, body:'#f0a24e', ol:'#8a4510'},
    {name:'dark',size:2.5, body:'#3a342d', ol:'#0d0b09'},
    {name:'grey',size:2.4, body:'#9aa0a6', ol:'#363b40'}
  ];

const POSES=['sit','loaf','sleep','stand'];
function svgURL(svg){return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);}
function rasterize(svg,h){return new Promise(res=>{const im=new Image();im.onload=()=>{const ratio=(im.width/im.height)||(64/56);const Wd=Math.max(1,Math.round(h*ratio));const cv=document.createElement('canvas');cv.width=Wd;cv.height=h;const c2=cv.getContext('2d');c2.imageSmoothingEnabled=false;c2.drawImage(im,0,0,Wd,h);res(cv.toDataURL('image/png'));};im.onerror=()=>res(null);im.src=svgURL(svg);});}
(async()=>{const grid=document.getElementById('grid');for(const cfg of FAMILY){const row=document.createElement('div');row.className='row';const lbl=document.createElement('div');lbl.className='cell';lbl.innerHTML='<h3>'+cfg.name+'</h3>';row.appendChild(lbl);for(const p of POSES){const u=await rasterize(buildPose(p,cfg),22);const c=document.createElement('div');c.className='cell';c.innerHTML='<img src="'+u+'"><h3>'+p+'</h3>';row.appendChild(c);}grid.appendChild(row);}})();
</script></body></html>
